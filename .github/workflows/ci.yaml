name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build the project
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: mernstack_auth_service_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Wait for PostgreSQL
        run: sleep 10

      - name: Create .env.test with localhost
        run: |
          cat > .env.test << 'EOF'
          PORT=5501
          NODE_ENV=test
          DB_HOST=localhost
          DB_PORT=5432
          DB_USERNAME=root
          DB_PASSWORD=root
          DB_NAME=mernstack_auth_service_test
          REFRESH_TOKEN_SECRET=test_secret
          JWKS_URI=http://localhost:5501/.well-known/jwks.json
          PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}
          EOF
          
          echo "✅ .env.test created with localhost"
          grep DB_HOST .env.test

      - name: Install dependencies
        run: npm ci

      - name: Run eslint
        run: npm run lint

      - name: Test and coverage
        run: npm run test

      - name: Build
        run: npm run build

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push-docker:
    name: Build and Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: neelcc/mernspace-c-auth-service
      IMAGE_TAG: build-${{ github.run_number }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --platform linux/amd64 -f docker/prod/DockerFile .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}